<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Уберите своё лицо. Вас всё ещё узнают?</title>

  <!-- Notibot Bridge — СИНХРОННО, локальный файл, без defer/async -->
  <script src="./js/notibot-bridge.js"></script>

  <style>
    :root{--black:#080808;--paper:#e8dfcf;--red:#781622;--blue:#3155d9}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#080808;color:var(--paper);font-family:Arial,sans-serif}.screen{min-height:100vh;background:radial-gradient(circle at 90% 10%,#291014,transparent 30%),#080808;position:relative;overflow:hidden}.grain{position:fixed;inset:0;z-index:9;pointer-events:none;opacity:.16;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.28'/%3E%3C/svg%3E")}.top{height:56px;border-bottom:1px solid #554e45;display:flex;align-items:center;justify-content:space-between;padding:0 4vw;font-size:10px;letter-spacing:.2em}.hero{display:grid;grid-template-columns:49% 51%;min-height:calc(100vh - 56px)}.copy{padding:5vw;align-self:center;z-index:2}.stamp{font-size:10px;letter-spacing:.2em;color:#d7464c;font-weight:900}.copy h1,.final h1,.clues h1{font:clamp(56px,7.2vw,118px)/.82 Impact,'Arial Narrow',sans-serif;letter-spacing:-.02em;margin:25px 0;text-transform:uppercase}.copy h1 em,.clues h1 em{font-style:normal;color:var(--blue)}.lead{font:clamp(17px,1.4vw,24px)/1.45 Georgia,serif;color:#c9c0b1;max-width:620px}.btn{border:0;background:var(--paper);color:#111;padding:18px 21px;margin-top:24px;font-size:11px;font-weight:900;letter-spacing:.1em;box-shadow:7px 7px var(--red);cursor:pointer;display:inline-flex;gap:30px;align-items:center;text-decoration:none}.btn:hover{transform:translate(-2px,-2px);box-shadow:10px 10px var(--blue)}.btn:disabled{opacity:.25;box-shadow:none;transform:none}.art{position:relative;min-height:600px;clip-path:polygon(7% 0,100% 0,100% 100%,0 100%,7% 73%,0 49%)}.art img,.caseimg img{width:100%;height:100%;object-fit:cover}.art:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#080808,transparent 27%)}.progress{height:4px;background:#29241f}.progress i{display:block;height:100%;background:var(--blue);transition:.3s}.case{display:grid;grid-template-columns:47% 53%;min-height:calc(100vh - 60px)}.caseimg{position:relative;overflow:hidden}.caseimg:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 65%,#080808)}.casecopy{padding:5vw;align-self:center}.casecopy h1{font:clamp(47px,5vw,84px)/.9 Impact;text-transform:uppercase;margin:18px 0}.question{font:clamp(19px,1.6vw,27px)/1.45 Georgia,serif;color:#d6ccbd}.answers{display:grid;gap:11px;margin:25px 0}.answer{background:#121110;color:#d7cfc1;border:1px solid #50493f;padding:15px;text-align:left;cursor:pointer;transition:.2s}.answer:hover,.answer.on{background:#151a2c;border-color:#3155d9;transform:translateX(5px)}.answer b{border:1px solid #756b5f;display:inline-grid;place-items:center;width:28px;height:28px;margin-right:12px}.verdict{background:var(--paper);color:#15120e;padding:16px;margin:18px 0;font:15px/1.45 Georgia;box-shadow:5px 5px var(--red)}.clues,.final{max-width:1250px;margin:auto;padding:5vw}.clues h1{font-size:clamp(55px,7vw,106px)}.cluegrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:40px 0}.clue{background:var(--paper);color:#15120e;padding:25px;min-height:290px;box-shadow:6px 6px #470c13}.clue b{font:50px Impact;color:var(--red)}.clue h2{font:28px/1 Impact;text-transform:uppercase}.clue p{font:15px/1.55 Georgia}.result{display:grid;grid-template-columns:1.1fr .9fr;gap:3vw}.paper{background:var(--paper);color:#17130f;padding:5vw}.score{font:clamp(100px,14vw,200px)/.8 Impact;color:var(--red);margin:30px 0}.score small{font-size:22px;color:#17130f}.paper h1{font-size:clamp(50px,6vw,88px)}.paper p,.bio p{font:18px/1.55 Georgia}.bio img{width:100%;height:300px;object-fit:cover;object-position:center 25%}.bio h2{font:clamp(48px,5vw,76px)/.88 Impact;text-transform:uppercase;margin:18px 0}.role{color:#df474d!important;text-transform:uppercase;font:11px Arial!important;letter-spacing:.17em}.form{display:grid;gap:12px;margin-top:22px}.form label span{display:block;font-size:9px;letter-spacing:.15em;color:#999083;margin-bottom:6px}.form input{width:100%;padding:14px;background:#11100f;border:1px solid #504a42;color:#fff}.consent{display:flex;gap:8px;font-size:10px;color:#aaa}.consent input{width:auto}.done{background:var(--paper);color:#111;padding:12px;font-size:12px;display:none}.hide{display:none!important}@media(max-width:850px){.hero,.case,.result{grid-template-columns:1fr}.art{order:-1;min-height:180px;height:30vh;max-height:280px;clip-path:none}.copy,.casecopy{padding:25px 20px 40px}.copy h1{font-size:42px;margin:15px 0}.caseimg{height:22vh;max-height:220px;min-height:140px}.caseimg:after{background:linear-gradient(0deg,#080808,transparent 45%)}.cluegrid{grid-template-columns:1fr 1fr}.final,.clues{padding:25px 15px}.top span:last-child{display:none}.bio img{height:200px}}@media(max-width:520px){.cluegrid{grid-template-columns:1fr}.btn{width:100%;justify-content:space-between}.copy h1,.clues h1{font-size:49px}.casecopy h1{font-size:47px}}
    .loader-screen{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background-color:var(--color-bg,#080808);z-index:9999}.loader-spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(128,128,128,0.2);border-top-color:var(--color-accent,#3155d9);animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

  <!-- Экран загрузки моста -->
  <div id="loading" class="loader-screen">
    <div class="loader-spinner"></div>
  </div>

  <!-- Эффект шума -->
  <div class="grain"></div>

  <!-- Корневой элемент приложения -->
  <div id="app"></div>

  <!-- Точка входа (ES Modules + Cache buster) -->
  <script type="module" src="./js/app.js?v=4.0"></script>

</body>
</html>
